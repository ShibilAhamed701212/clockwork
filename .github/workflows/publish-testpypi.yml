name: Publish TestPyPI

on:
  push:
    tags:
      - "v*-rc*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-testpypi
          path: dist/

      - name: Prepare smoke-test metadata
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p smoke
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPI_VERSION="$(echo "$TAG_VERSION" | sed -E 's/-rc([0-9]+)$/rc\1/')"
          echo "$PYPI_VERSION" > smoke/version.txt

      - name: Upload smoke-test metadata
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-smoke-metadata
          path: smoke/version.txt

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-testpypi
          path: dist/

      - name: Publish to TestPyPI (Trusted Publishing)
        if: ${{ secrets.TEST_PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to TestPyPI (API token fallback)
        if: ${{ secrets.TEST_PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
