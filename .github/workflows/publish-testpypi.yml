name: Publish TestPyPI

on:
  push:
    tags:
      - "v*-rc*"
  workflow_dispatch:

jobs:
  build:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate RC tag format
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "Invalid RC tag format: ${GITHUB_REF_NAME}"
            echo "Expected: v<major>.<minor>.<patch>-rc<build> (example: v0.2.1-rc1)"
            exit 1
          fi

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-testpypi
          path: dist/

      - name: Prepare smoke-test metadata
        shell: bash
        run: |
          mkdir -p smoke
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            PYPI_VERSION="$(echo "$TAG_VERSION" | sed -E 's/-rc([0-9]+)$/rc\1/')"
          else
            PYPI_VERSION="$(python - <<'PY'
import glob
import re
from pathlib import Path
wheels = sorted(glob.glob('dist/*.whl'))
if not wheels:
    raise SystemExit('No wheel produced in dist/')
name = Path(wheels[-1]).name
m = re.match(r'^[^-]+-([0-9][^-]*)-', name)
if not m:
    raise SystemExit(f'Unable to parse version from wheel: {name}')
print(m.group(1))
PY
            )"
          fi
          echo "$PYPI_VERSION" > smoke/version.txt
          echo "Resolved smoke version: $PYPI_VERSION"

      - name: Upload smoke-test metadata
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-smoke-metadata
          path: smoke/version.txt

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-testpypi
          path: dist/

      - name: Publish to TestPyPI (Trusted Publishing)
        if: ${{ secrets.TEST_PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to TestPyPI (API token fallback)
        if: ${{ secrets.TEST_PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
