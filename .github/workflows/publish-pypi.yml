name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate stable tag format
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable tag format: ${GITHUB_REF_NAME}"
            echo "Expected: v<major>.<minor>.<patch> (example: v0.2.1)"
            exit 1
          fi

      - name: Check pyproject consistency
        shell: bash
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          root = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          nested = tomllib.loads(Path("clockwork/clockwork_project/clockwork-src/pyproject.toml").read_text(encoding="utf-8"))
          checks = [
              ("project.name", root["project"]["name"], nested["project"]["name"]),
              ("project.version", root["project"]["version"], nested["project"]["version"]),
              ("project.requires-python", root["project"]["requires-python"], nested["project"]["requires-python"]),
              ("project.dependencies", root["project"]["dependencies"], nested["project"]["dependencies"]),
              ("project.optional-dependencies", root["project"]["optional-dependencies"], nested["project"]["optional-dependencies"]),
              ("project.scripts", root["project"]["scripts"], nested["project"]["scripts"]),
          ]
          mismatches = [name for name, a, b in checks if a != b]
          if mismatches:
              for name in mismatches:
                  print(f"Mismatch: {name}")
              raise SystemExit("pyproject metadata drift detected")
          print("Root and nested pyproject metadata are consistent.")
          PY

      - name: Build distribution
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI (API token fallback)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
