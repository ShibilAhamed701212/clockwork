name: TestPyPI Smoke Test

on:
  workflow_run:
    workflows:
      - Publish TestPyPI
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: "Exact package version to test (for example: 0.2.1rc1)"
        required: false
        type: string

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download published version metadata
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          name: testpypi-smoke-metadata
          path: smoke

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          VERSION=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -f smoke/version.txt ]; then
            VERSION="$(cat smoke/version.txt)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Require exact version metadata for workflow_run
        if: ${{ github.event_name == 'workflow_run' && steps.version.outputs.version == '' }}
        run: |
          echo "Missing smoke metadata artifact or version.txt from Publish TestPyPI run."
          exit 1

      - name: Install exact package version from TestPyPI
        if: ${{ steps.version.outputs.version != '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "clockwork==${{ steps.version.outputs.version }}"

      - name: Install latest prerelease from TestPyPI
        if: ${{ github.event_name == 'workflow_dispatch' && steps.version.outputs.version == '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            clockwork

      - name: CLI smoke test
        run: |
          clockwork --help
          clockwork-mcp --help
