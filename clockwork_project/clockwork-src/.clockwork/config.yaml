# Clockwork Runtime Configuration
# ---------------------------------

brain:
  mode: minibrain

scanner:
  ignore_dirs:
    - .git
    - __pycache__
    - node_modules
    - .venv
    - dist
    - build
  ignore_extensions:
    - .pyc
    - .pyo

packaging:
  auto_snapshot: false

logging:
  level: info
