clockwork:
  version: "2.0"
  mode: safe
  learning: enabled
  autonomy: restricted
  validation: strict

  personality:
    style: conservative

  execution:
    sandbox: true
    dry_run: false
    max_retries: 3
    timeout_seconds: 60

  memory:
    persist: true
    location: ".clockwork/"
    protected: true

  logging:
    level: INFO
    log_dir: "logs/"

  security:
    zero_trust: true
    sandbox_all: true
    secrets_scan: true